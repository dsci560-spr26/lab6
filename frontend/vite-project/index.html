<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Well Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="node_modules/ol/ol.css">
    <style>
      :root {
        --bg: #0d0f14;
        --surface: #151820;
        --border: #252a36;
        --accent: #e8c96d;
        --text: #e2e6f0;
        --muted: #6b7280;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'IBM Plex Mono', monospace;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* Header */
      header {
        display: flex;
        align-items: center;
        padding: 0 24px;
        height: 50px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }

      .logo {
        font-family: 'Syne', sans-serif;
        font-weight: 800;
        font-size: 17px;
        color: var(--accent);
      }

      .logo span { color: var(--text); }

      .status {
        margin-left: auto;
        font-size: 10px;
        color: var(--muted);
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .dot {
        width: 6px; height: 6px;
        border-radius: 50%;
        background: #22c55e;
        animation: blink 2s infinite;
      }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }

      /* Map */
      #map {
        flex: 1;
        width: 100%;
      }

      /* OL Controls */
      .ol-zoom { top: 16px; left: 16px; }

      .ol-zoom button {
        background: var(--surface) !important;
        color: var(--text) !important;
        border: 1px solid var(--border) !important;
        border-radius: 4px !important;
        width: 28px !important;
        height: 28px !important;
        font-size: 18px !important;
        line-height: 1 !important;
      }

      .ol-zoom button:hover { background: var(--border) !important; }
      .ol-attribution { font-size: 9px !important; opacity: 0.3 !important; }

      /* Marker */
      .map-marker {
        font-size: 22px;
        cursor: pointer;
        transition: transform 0.2s;
        /* filter: drop-shadow(0 2px 6px rgba(0,0,0,0.6)); */
        user-select: none;
      }

      .map-marker:hover { transform: scale(1.35) translateY(-2px); }

      /* Bootstrap Popover Override */
      .popover {
        font-family: 'IBM Plex Mono', monospace !important;
        background: var(--surface) !important;
        border: 1px solid var(--border) !important;
        border-radius: 10px !important;
        box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
        min-width: 260px !important;
        max-width: 320px !important;
      }

      .popover-header {
        font-family: 'Syne', sans-serif !important;
        font-size: 13px !important;
        font-weight: 700 !important;
        background: var(--bg) !important;
        color: var(--accent) !important;
        border-bottom: 1px solid var(--border) !important;
        border-radius: 10px 10px 0 0 !important;
        padding: 10px 14px !important;
      }

      .popover-body {
        background: var(--surface) !important;
        color: var(--text) !important;
        padding: 10px 14px !important;
        border-radius: 0 0 10px 10px !important;
        font-size: 11px !important;
      }

      .popover-body ul {
        margin: 0 !important;
        padding: 0 !important;
        list-style: none !important;
      }

      .popover-body ul li {
        padding: 5px 0;
        border-bottom: 1px solid var(--border);
        display: flex;
        gap: 8px;
        line-height: 1.4;
      }

      .popover-body ul li:last-child { border-bottom: none; }

      .popover-body ul li strong {
        color: var(--muted);
        font-weight: 400;
        flex-shrink: 0;
        min-width: 95px;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.3px;
        padding-top: 1px;
      }

      /* Popover arrow */
      .popover-arrow::after { border-top-color: var(--surface) !important; }
      .popover-arrow::before { border-top-color: var(--border) !important; }
    </style>
  </head>
  <body>

    <header>
      <div class="logo">WELL<span>EXPLORER</span></div>
      <div class="status">
        <div class="dot"></div>
        CONNECTED
      </div>
    </header>

    <div id="map"></div>

    <!-- hidden OL elements (unchanged) -->
    <div style="display: none;">
      <a class="overlay" id="vienna" target="_blank" href="https://en.wikipedia.org/wiki/Vienna">Vienna</a>
      <div id="marker" title="Marker"></div>
      <div id="popup"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="src/openlayer.js"></script>
  </body>
</html>
